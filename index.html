<!DOCTYPE html>
<html>
<head>
    <title>Buttons </title>
    <style>
        #btn-recording {
            background-color: #99c2ff;
            border-radius: 20px 100px 20px 100px;
            margin: 20px;
            padding: 20px;
            height: 50px;
            width: 200px;
            border-style: dotted;
            font-size: 20px;
        }

        #btn-chat {
            background-color: green;
            color: white;
            border-radius: 30px 90px 30px 90px;
            margin: 20px;
            padding: 2opx;
            height: 50px;
            width: 200px;
            border-style: dashed;
            font-size: 24px;
        }


        #btn-Comment {
            background-color: red;
            color: white;
            border-radius: 100px 60px 100px 60px;
            margin: 20px;
            padding: 20px;
            height: 50px;
            width: 200px;
            border-style: double;
            font-size: 24px;
        }

        #btn-Enter {
            background-color: rgb(0, 255, 183);
            color: white;
            border-radius: 100px 20px 100px 20px;
            margin: 20px;
            padding: 20px;
            height: 50px;
            width: 200px;
            font-size: 24px;
        }

        #btn-Submit {
            background-color: rgb(134, 176, 70);
            color: white;
            border-radius: 100px 20x 100px 20px;
            margin: 20px;
            padding: 20px;
            height: 50px;
            width: 200px;
            border-style: dotted;
            font-size: 24px;
        }

        #btn-presenting {
            background-color: rgb(188, 175, 30);
            color: white;
            border-radius: 10px 40px 20px 40px;
            margin: 20px;
            padding: 20px;
            height: 50px;
            width: 200px;
            font-size: 24px;
        }

        

        .btn-click-me{
            height: 40px;
            width: 200px;
            background-color: red;
            border: none;
            border-radius: 20px 20px 20px 20px;
            color: white;
            font-size: 20px;
        }

        .click-me{
            background-color: #ff9933;
            font-size: 24px;
            color: #fff;
            border:6px double #e67300;
            padding: 3px 20px;
            border-radius: 20px 0 20px 0;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <h1>Button</h1>
    <button id="btn-recording" class="google-btn">Start Recording</button>

    <br/><br>

    <button class="btn-click-me">Click Me!</button>

    <br /><br />

    <button id="btn-chat" class="whatsapp-btn">Start chat</button>

    <br /><br />


    <button id="btn-Comment" class="youtube-btn">Comment</button>

    <br /><br />

    <button id="btn-Enter" class="normal-btn">Enter</button>

    <br /><br />

    <button id="btn-Submit" class="normal-btn">Submit</button>

    <br /><br />
    <button id="btn-presenting" class="google-btn">Start Presenting</button>

    <br/><br/>

    <button class="click-me">Click Me</button>

</body>

</html>
